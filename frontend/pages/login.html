<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Shop | Đăng nhập</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="login">
  <header id="site-header"></header>
  <main class="page-section container">
    <div class="auth-box form-card">
      <h1 class="page-title" style="font-size:2rem;">Đăng nhập</h1>
      <form id="login-form">
        <div class="field"><label>Email</label><input id="login-email" type="email" required></div>
        <div class="field"><label>Mật khẩu</label><input id="login-password" type="password" minlength="8" required></div>
        <button class="button" type="submit">Đăng nhập</button>
      </form>
      <p class="muted">Tài khoản demo sau khi seed: admin@example.com / Admin123! hoặc customer@example.com / Customer123!</p>
      <p><a class="nav-link active" href="admin-login.html">Đăng nhập vào khu admin</a></p>
    </div>
  </main>
  <footer id="site-footer"></footer>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/login.js"></script>
</body>
</html>
