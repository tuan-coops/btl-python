<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Shop | Đăng ký</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="register">
  <header id="site-header"></header>
  <main class="page-section container">
    <div class="auth-box form-card">
      <h1 class="page-title" style="font-size:2rem;">Đăng ký tài khoản</h1>
      <form id="register-form">
        <div class="field"><label>Họ tên</label><input id="register-full-name" required></div>
        <div class="field"><label>Email</label><input id="register-email" type="email" required></div>
        <div class="field"><label>Số điện thoại</label><input id="register-phone"></div>
        <div class="field"><label>Mật khẩu</label><input id="register-password" type="password" minlength="8" required></div>
        <button class="button" type="submit">Tạo tài khoản</button>
      </form>
    </div>
  </main>
  <footer id="site-footer"></footer>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/register.js"></script>
</body>
</html>
