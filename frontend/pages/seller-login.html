<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Shop | Đăng nhập người bán</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="seller-login">
  <header id="site-header"></header>
  <main class="page-section container">
    <div class="auth-box form-card">
      <h1 class="page-title" style="font-size:2rem;">Đăng nhập khu vực người bán</h1>
      <form id="seller-login-form">
        <div class="field"><label>Email người bán</label><input id="seller-login-email" type="email" required></div>
        <div class="field"><label>Mật khẩu</label><input id="seller-login-password" type="password" minlength="8" required></div>
        <button class="button" type="submit">Đăng nhập người bán</button>
      </form>
    </div>
  </main>
  <footer id="site-footer"></footer>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/seller-login.js"></script>
</body>
</html>
