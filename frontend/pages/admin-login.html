<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Shop | Đăng nhập admin</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="admin-login">
  <header id="site-header"></header>
  <main class="page-section container">
    <div class="auth-box form-card">
      <p class="badge">Chỉ dành cho admin</p>
      <h1 class="page-title" style="font-size:2rem;">Đăng nhập khu vực quản trị</h1>
      <p class="section-subtitle">Trang này chỉ dành cho tài khoản có role admin. Sau khi đăng nhập, frontend sẽ kiểm tra lại bằng `/auth/me` và admin APIs.</p>
      <form id="admin-login-form">
        <div class="field"><label>Email admin</label><input id="admin-login-email" type="email" required></div>
        <div class="field"><label>Mật khẩu</label><input id="admin-login-password" type="password" minlength="8" required></div>
        <button class="button" type="submit">Đăng nhập admin</button>
      </form>
      <p class="muted">Tài khoản demo: admin@example.com / Admin123!</p>
    </div>
  </main>
  <footer id="site-footer"></footer>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/admin-login.js"></script>
</body>
</html>
