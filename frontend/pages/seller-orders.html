<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Shop | Quản lý đơn hàng</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body data-page="seller-orders">
  <header id="site-header"></header>
  <main class="page-section container">
    <div class="page-header">
      <div>
        <h1 class="page-title">Quản lý đơn hàng</h1>
        <p class="section-subtitle">Xem danh sách đơn và cập nhật trạng thái hợp lệ.</p>
      </div>
    </div>
    <div class="grid-two">
      <div class="table-card">
        <form id="seller-order-filter-form" class="filter-row">
          <select id="seller-order-filter-status">
            <option value="">Tất cả trạng thái</option>
            <option value="pending">pending</option>
            <option value="confirmed">confirmed</option>
            <option value="shipping">shipping</option>
            <option value="completed">completed</option>
            <option value="cancelled">cancelled</option>
          </select>
          <button class="button-ghost" type="submit">Lọc</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Trạng thái</th><th>Tổng tiền</th><th>Ngày tạo</th><th></th></tr></thead>
            <tbody id="seller-orders-body"></tbody>
          </table>
        </div>
        <div id="seller-orders-pagination"></div>
      </div>
      <div id="seller-order-detail"></div>
    </div>
  </main>
  <footer id="site-footer"></footer>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/storage.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
  <script src="../assets/js/ui.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/seller-orders.js"></script>
</body>
</html>
